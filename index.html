<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RÔ TRÀNG</title>

    <style>
        /* RESET CSS */
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #2e002a 0%, #05000a 100%);
            /* Cập nhật màu nền tím thẫm */
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            touch-action: none;
            cursor: grab;
        }

        canvas:active {
            cursor: grabbing;
        }

        /* Màn hình chào mừng - Hồng sẫm đậm đà */
        #intro {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #66002a, #1a0009);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
            transition: opacity 1s ease-out, visibility 1s;
        }

        #intro.hidden {
            opacity: 0;
            visibility: hidden;
        }

        #intro h1 {
            font-size: 35px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #ff0055, 0 0 40px #ff007f;
            text-align: center;
        }

        #intro button {
            margin-top: 30px;
            padding: 15px 50px;
            font-size: 22px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            background: linear-gradient(45deg, #ff0055, #b3003b);
            color: white;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.6);
            transition: transform 0.2s, box-shadow 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        #intro button:hover,
        #intro button:active {
            transform: scale(1.1);
            box-shadow: 0 0 50px rgba(255, 0, 85, 0.9);
        }

        /* Text hints */
        #hints {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255, 150, 180, 0.8);
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.8);
            animation: fadeOutHint 8s forwards;
            animation-delay: 5s;
        }

        @keyframes fadeOutHint {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        /* Lớp phủ Zoom Ảnh */
        #image-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(10, 0, 5, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s;
            cursor: zoom-out;
        }

        #image-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        #image-overlay img {
            max-width: 95%;
            max-height: 95%;
            border-radius: 15px;
            box-shadow: 0 0 40px rgba(255, 0, 85, 0.8);
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            object-fit: contain;
        }

        #image-overlay.active img {
            transform: scale(1);
        }
    </style>
</head>

<body>

    <div id="intro">
        <h1>TẶNG BÉ YÊU CỦA ANH</h1>
        <p style="font-size: 18px; opacity: 0.9; text-shadow: 0 0 10px #ff0055;">Nhớ tìm thiệp chúc nhé...</p>
        <button onclick="start()">Bắt Đầu</button>
    </div>

    <div id="hints">✨ Vuốt nhẹ để xoay - Click ảnh để xem lớn - Thỉnh thoảng sẽ có sao chổi xuyên qua ✨</div>

    <canvas id="canvas"></canvas>

    <div id="image-overlay" onclick="closeZoom()">
        <img id="zoomed-image" src="" alt="Zoomed">
    </div>

    <audio id="music" loop preload="auto">
        <source src="anh/daidientraitim.mp3" type="audio/mp3">
    </audio>

    <script>
        // ==========================================
        // TÙY CHỈNH THÔNG TIN
        // ==========================================
        const tenNguoiYeu = "Bé Heo";

        const urlAnhThucTe = [
            "anh/anh1.jpg",
            "anh/anh2.jpg",
            "anh/anh3.jpg",
            "anh/anh4.jpg",
            "anh/anh5.jpg",
            "anh/anh6.jpg",
            "anh/anh7.jpg",
            "anh/anh8.jpg",
            "anh/anh9.jpg",
            "anh/anh10.jpg",
            "anh/anh11.jpg",
            "anh/anh12.jpg",
            "anh/anh13.jpg",
            "anh/anh14.jpg",
            "anh/anh15.jpg",
            "anh/anh16.jpg",
            "anh/anh17.jpg",
            "anh/anh18.jpg",
            "anh/anh19.jpg",
            "anh/thiepchuc.jpg",




        ];

        let textMessages = [
            "anh", "yêu", "vợ", "rất", "nhiều", "mãi", "yêu", "em", "rô", "tràng"
        ];

        const heartPath = new Path2D("M8 3 C8 2 7 0 4 0 C0 0 0 4 0 4 C0 7 3.5 11 8 15 C12.5 11 16 7 16 4 C16 4 16 0 12 0 C9 0 8 2 8 3 Z");

        // ==========================================
        // ENGINE CANVAS 3D
        // ==========================================
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let w, h;

        const items = [];
        const stars = [];
        const heartStars = [];
        const galaxyHearts = [];
        const risingHearts = [];
        const comets = []; // Đổi tên planets thành comets để quản lý sao chổi
        let isRunning = false;

        let sequenceTick = 0;
        let cometSpawnTimer = 0;

        let dragRotX = 0, dragRotY = 0;
        let targetDragRotX = 0, targetDragRotY = 0;
        let globalZoom = 1, targetZoom = 1;
        let heartBeat = 0;

        let isDragging = false;
        let isClick = true;
        let startX = 0, startY = 0;

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 1. NGÂN HÀ CHUYỂN ĐỘNG
        function createStars() {
            stars.length = 0;
            let numStars = 250;
            for (let i = 0; i < numStars; i++) {
                stars.push({
                    angle: Math.random() * Math.PI * 2,
                    radius: Math.random() * 1000 + 200,
                    y: (Math.random() - 0.5) * h * 3,
                    speed: (Math.random() * 0.003) + 0.001,
                    size: Math.random() * 1.5 + 0.5,
                    alpha: Math.random() * 0.5 + 0.1
                });
            }
        }

        function createHeartStars() {
            heartStars.length = 0;
            let numHeartStars = 150;
            const heartColors = ['#ff0055', '#cc0044', '#ff3377', '#ff80aa'];
            for (let i = 0; i < numHeartStars; i++) {
                heartStars.push({
                    angle: Math.random() * Math.PI * 2,
                    radius: Math.random() * 1200 + 200,
                    y: (Math.random() - 0.5) * h * 3,
                    speed: (Math.random() * 0.004) + 0.0015,
                    size: Math.random() * 12 + 6,
                    alpha: Math.random() * 0.7 + 0.2,
                    color: heartColors[Math.floor(Math.random() * heartColors.length)]
                });
            }
        }

        function getHeartPoint(x, y, z) {
            let a = x * x + 2.25 * y * y + z * z - 1;
            return a * a * a - x * x * z * z * z - 0.1125 * y * y * z * z * z;
        }

        // 2. KHỐI TRÁI TIM ĐƯỢC TẠO TỪ NHIỀU TRÁI TIM NHỎ
        function create3DHeart() {
            items.length = 0;
            let numParticles = Math.min(w, h) < 500 ? 2000 : 4000;
            let heartScale = Math.min(w, h) * 0.20;

            let count = 0;
            while (count < numParticles) {
                let x = (Math.random() - 0.5) * 3;
                let y = (Math.random() - 0.5) * 3;
                let z = (Math.random() - 0.5) * 3;

                if (getHeartPoint(x, y, z) <= 0) {
                    let px = x * heartScale;
                    let py = -z * heartScale - 20;
                    let pz = y * heartScale;

                    let hue = 330 + Math.random() * 20;
                    let saturation = 100;
                    let lightness = 40 + Math.random() * 25;

                    items.push({
                        type: 'particle',
                        isStatic: true,
                        originX: px, originY: py, originZ: pz,
                        dx: 0, dy: 0, dz: 0,
                        vx: (Math.random() - 0.5) * 3,
                        vy: (Math.random() - 0.5) * 3,
                        vz: (Math.random() - 0.5) * 3,
                        size: Math.random() * 4 + 2,
                        color: `hsla(${hue}, ${saturation}%, ${lightness}%, ${Math.random() * 0.8 + 0.2})`
                    });
                    count++;
                }
            }
        }

        // 2.5 TẠO SAO CHỔI BAY XUYÊN TÂM VÀ KHUẤY TUNG MỌI THỨ
        function spawnComet() {
            let theta = Math.random() * Math.PI * 2;
            let phi = Math.acos((Math.random() * 2) - 1);
            let radius = 1500; // Khoảng cách sinh ra đủ xa

            let px = radius * Math.sin(phi) * Math.cos(theta);
            let py = radius * Math.sin(phi) * Math.sin(theta);
            let pz = radius * Math.cos(phi);

            // Vận tốc hướng về tâm, tốc độ cực nhanh
            let speed = 25 + Math.random() * 10;
            let vx = -px / radius * speed;
            let vy = -py / radius * speed;
            let vz = -pz / radius * speed;

            let colors = ['#00ffff', '#ffd700', '#ffffff', '#ff99ff'];
            let color = colors[Math.floor(Math.random() * colors.length)];

            comets.push({
                x: px, y: py, z: pz,
                vx: vx, vy: vy, vz: vz,
                size: 8 + Math.random() * 6, // Kích thước đầu sao chổi
                color: color,
                life: 300,
                history: [] // Lưu vết để vẽ đuôi
            });
        }

        // 3. VỆ TINH BAY ÊM ÁI
        function createOrbitingItems() {
            let numImages = 20;
            let numTexts = 10;
            let baseOrbitRadius = Math.min(w, h) * 0.45;

            for (let i = 0; i < numImages; i++) {
                let img = new Image();
                img.src = urlAnhThucTe[i] || `https://picsum.photos/400/400?random=${i}`;
                items.push({
                    type: 'image', img: img,
                    path_t: Math.random() * Math.PI * 2,
                    orbit_radius: baseOrbitRadius * (Math.random() * 0.4 + 0.8),
                    orbit_y_angle: (Math.random() - 0.5) * Math.PI,
                    orbit_x_angle: (Math.random() - 0.5) * Math.PI,
                    orbit_speed: (Math.random() * 0.006 + 0.002) * (Math.random() > 0.5 ? 1 : -1)
                });
            }

            for (let i = 0; i < numTexts; i++) {
                items.push({
                    type: 'text', text: textMessages[i],
                    path_t: Math.random() * Math.PI * 2,
                    orbit_radius: baseOrbitRadius * (Math.random() * 0.4 + 0.8),
                    orbit_y_angle: (Math.random() - 0.5) * Math.PI,
                    orbit_x_angle: (Math.random() - 0.5) * Math.PI,
                    orbit_speed: (Math.random() * 0.006 + 0.002) * (Math.random() > 0.5 ? 1 : -1)
                });
            }
        }

        function getParametricHeartPoint(t, radius) {
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            let z = 10 * Math.sin(t);
            return { x: x * radius / 16, y: y * radius / 16, z: z * radius / 16 };
        }

        function project3D(x, y, z, rotX, rotY, zoom) {
            let rx1 = x * Math.cos(rotY) - z * Math.sin(rotY);
            let rz1 = x * Math.sin(rotY) + z * Math.cos(rotY);
            let ry1 = y;

            let rx2 = rx1;
            let ry2 = ry1 * Math.cos(rotX) - rz1 * Math.sin(rotX);
            let rz2 = ry1 * Math.sin(rotX) + rz1 * Math.cos(rotX);

            let perspective = 800;
            let scale = (perspective / (perspective + rz2)) * zoom;

            return {
                screenX: w / 2 + rx2 * scale,
                screenY: h / 2 + ry2 * scale,
                screenZ: rz2,
                scale: scale
            };
        }

       function applySequenceModifiers(item, isHeartParticle, baseX, baseY, baseZ) {
            if (sequenceTick === 0) return { x: baseX, y: baseY, z: baseZ };
            let px = baseX, py = baseY, pz = baseZ;

            // Phân loại hạt vào 2 nhóm (trái tim trái và phải)
            if (!item.group) item.group = Math.random() > 0.5 ? 1 : -1;

            if (sequenceTick <= 60) {
                if (isHeartParticle) {
                    px = baseX + item.vx * sequenceTick * 2.5; py = baseY + item.vy * sequenceTick * 2.5; pz = baseZ + item.vz * sequenceTick * 2.5;
                }
            } else if (sequenceTick <= 150) {
                let t = (sequenceTick - 60) / 90;
                let easeIn = t * t * t;
                if (isHeartParticle) {
                    let splitX = baseX + item.vx * 60 * 2.5; let splitY = baseY + item.vy * 60 * 2.5; let splitZ = baseZ + item.vz * 60 * 2.5;
                    px = splitX * (1 - easeIn); py = splitY * (1 - easeIn); pz = splitZ * (1 - easeIn);
                } else {
                    px = baseX * (1 - easeIn); py = baseY * (1 - easeIn); pz = baseZ * (1 - easeIn);
                }
                if (sequenceTick === 150) {
                    let theta = Math.random() * Math.PI * 2; let phi = Math.acos((Math.random() * 2) - 1);
                    item.ex = Math.sin(phi) * Math.cos(theta); item.ey = Math.sin(phi) * Math.sin(theta); item.ez = Math.cos(phi);
                }
            } else if (sequenceTick <= 190) {
                let t = (sequenceTick - 150) / 40;
                let easeOut = Math.sqrt(t);
                let radius = 3000 * easeOut;
                px = item.ex * radius; py = item.ey * radius; pz = item.ez * radius;
            } else if (sequenceTick <= 260) {
                // GIAI ĐOẠN 1: Hạt từ vụ nổ gom lại thành 2 trái tim nhỏ
                let t = (sequenceTick - 190) / 70;
                let easeInOut = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
                
                let explodedX = item.ex * 3000; let explodedY = item.ey * 3000; let explodedZ = item.ez * 3000;
                
                let targetX = baseX * 0.5 + item.group * 300; 
                let targetY = baseY * 0.5;
                let targetZ = baseZ * 0.5;

                px = explodedX * (1 - easeInOut) + targetX * easeInOut;
                py = explodedY * (1 - easeInOut) + targetY * easeInOut;
                pz = explodedZ * (1 - easeInOut) + targetZ * easeInOut;
                
            } else if (sequenceTick <= 300) {
                // GIAI ĐOẠN 2: Hai trái tim nhỏ ĐỨNG YÊN
                px = baseX * 0.5 + item.group * 300;
                py = baseY * 0.5;
                pz = baseZ * 0.5;
                
            } else if (sequenceTick <= 350) {
                // GIAI ĐOẠN 3 MỚI: Các hạt rời vị trí (bung nhẹ ra xung quanh)
                let t = (sequenceTick - 300) / 50;
                let easeOut = Math.sin(t * Math.PI / 2); // Tạo độ mượt khi bung
                
                let scatterDist = 120 * easeOut; // Khoảng cách các hạt bung ra (có thể tăng giảm số 120)
                
                px = baseX * 0.5 + item.group * 300 + item.ex * scatterDist;
                py = baseY * 0.5 + item.ey * scatterDist;
                pz = baseZ * 0.5 + item.ez * scatterDist;

            } else if (sequenceTick <= 450) {
                // GIAI ĐOẠN 4 MỚI: Kéo 2 cụm hạt đang lộn xộn vào nhau thành trái tim to
                let t = (sequenceTick - 350) / 100;
                
                let delay = (item.ex + 1) / 2 * 0.4; 
                let progress = Math.max(0, Math.min(1, (t - delay) / 0.6)); 
                let easeInOut = progress < 0.5 ? 4 * progress * Math.pow(progress, 2) : 1 - Math.pow(-2 * progress + 2, 3) / 2;

                // Vị trí bắt đầu kéo là vị trí đang bung ra ở cuối GĐ 3
                let startX = baseX * 0.5 + item.group * 300 + item.ex * 120;
                let startY = baseY * 0.5 + item.ey * 120;
                let startZ = baseZ * 0.5 + item.ez * 120;

                px = startX * (1 - easeInOut) + baseX * easeInOut;
                py = startY * (1 - easeInOut) + baseY * easeInOut;
                pz = startZ * (1 - easeInOut) + baseZ * easeInOut;
            }
            return { x: px, y: py, z: pz };
        }
        // 4. VÒNG LẶP RENDER 3D CHÍNH
        function render() {
            heartBeat += 0.18; 
let beatScale = 1 + Math.sin(heartBeat) * 0.18;

            if (!isRunning) return;

            if (sequenceTick > 0) sequenceTick++;
            if (sequenceTick > 550) sequenceTick = 0;

            // Sinh Sao Chổi ngẫu nhiên
            if (sequenceTick === 0) {
                cometSpawnTimer++;
                if (cometSpawnTimer > 180) { // Khoảng 3 giây sinh 1 lần
                    if (Math.random() > 0.4) spawnComet();
                    cometSpawnTimer = 0;
                }
            } else {
                comets.length = 0;
            }

            ctx.fillStyle = 'rgba(10, 0, 5, 0.4)'; // Hiệu ứng motion blur nhẹ
            ctx.fillRect(0, 0, w, h);

            dragRotX += (targetDragRotX - dragRotX) * 0.05;
            dragRotY += (targetDragRotY - dragRotY) * 0.05;
            globalZoom += (targetZoom - globalZoom) * 0.1;

            let finalRotY = dragRotY;
            let finalRotX = 0.2 + dragRotX;
            finalRotX = Math.max(-Math.PI / 2.5, Math.min(Math.PI / 2.5, finalRotX));

            // VẼ SAO TRUYỀN THỐNG
            stars.forEach(star => {
                star.angle += star.speed;
                let baseX = Math.cos(star.angle) * star.radius; let baseZ = Math.sin(star.angle) * star.radius; let baseY = star.y;
                let mod = applySequenceModifiers(star, false, baseX, baseY, baseZ);
                let proj = project3D(mod.x, mod.y, mod.z, finalRotX, finalRotY, globalZoom);
                if (proj.scale > 0 && proj.screenX > 0 && proj.screenX < w && proj.screenY > 0 && proj.screenY < h) {
                    ctx.globalAlpha = star.alpha;
                    ctx.fillStyle = '#ffb3cc';
                    let finalSize = Math.max(0.5, star.size * proj.scale);
                    ctx.fillRect(proj.screenX, proj.screenY, finalSize, finalSize);
                }
            });

            // VẼ TIM BAO QUANH
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            heartStars.forEach(star => {
                star.angle += star.speed;
                let baseX = Math.cos(star.angle) * star.radius; let baseZ = Math.sin(star.angle) * star.radius; let baseY = star.y;
                let mod = applySequenceModifiers(star, false, baseX, baseY, baseZ);
                let proj = project3D(mod.x, mod.y, mod.z, finalRotX, finalRotY, globalZoom);
                if (proj.scale > 0 && proj.screenX > 0 && proj.screenX < w && proj.screenY > 0 && proj.screenY < h) {
                    ctx.globalAlpha = star.alpha;
                    ctx.fillStyle = star.color;
                    let finalSize = Math.max(3, star.size * proj.scale);
                    ctx.font = `${finalSize}px 'Segoe UI', Arial, sans-serif`;
                    ctx.fillText('❤', proj.screenX, proj.screenY);
                }
            });
            ctx.globalAlpha = 1;

            // ===============================================
            // XỬ LÝ SAO CHỔI BAY, VẼ ĐUÔI VÀ KHUẤY TUNG MỌI THỨ
            // ===============================================
            for (let i = comets.length - 1; i >= 0; i--) {
                let c = comets[i];
                c.history.push({ x: c.x, y: c.y, z: c.z });
                if (c.history.length > 15) c.history.shift(); // Giới hạn chiều dài đuôi

                c.x += c.vx;
                c.y += c.vy;
                c.z += c.vz;
                c.life--;

                if (c.life <= 0) {
                    comets.splice(i, 1);
                    continue;
                }

                // Vẽ đuôi sao chổi (nối các điểm history)
                if (c.history.length > 1) {
                    ctx.beginPath();
                    for (let j = 0; j < c.history.length; j++) {
                        let pt = c.history[j];
                        let proj = project3D(pt.x, pt.y, pt.z, finalRotX, finalRotY, globalZoom);
                        if (proj.scale > 0) {
                            if (j === 0) ctx.moveTo(proj.screenX, proj.screenY);
                            else ctx.lineTo(proj.screenX, proj.screenY);
                        }
                    }
                    ctx.strokeStyle = c.color;
                    ctx.lineWidth = c.size * 0.8 * globalZoom;
                    // Làm mờ dần về cuối đuôi
                    ctx.globalAlpha = 0.6;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = c.color;
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                    ctx.shadowBlur = 0;
                }

                // Vẽ đầu sao chổi
                let proj = project3D(c.x, c.y, c.z, finalRotX, finalRotY, globalZoom);
                if (proj.scale > 0) {
                    ctx.beginPath();
                    ctx.arc(proj.screenX, proj.screenY, c.size * proj.scale, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.shadowBlur = 30 * proj.scale;
                    ctx.shadowColor = c.color;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }

                // Lực khuấy tung (Rộng hơn và mạnh hơn bản cũ)
                let impactRadius = c.size * 10;
                let force = c.size * 3.5;

                // 1. Khuấy tung Trái tim (items)
                items.forEach(item => {
                    if (item.isStatic && sequenceTick === 0) {
                        let currentX = item.originX + item.dx;
                        let currentY = item.originY + item.dy;
                        let currentZ = item.originZ + item.dz;
                        let distSq = Math.pow(currentX - c.x, 2) + Math.pow(currentY - c.y, 2) + Math.pow(currentZ - c.z, 2);

                        if (distSq < impactRadius * impactRadius) {
                            let dist = Math.sqrt(distSq) || 1;
                            let pushFactor = ((impactRadius - dist) / impactRadius) * force;
                            item.dx += ((currentX - c.x) / dist) * pushFactor;
                            item.dy += ((currentY - c.y) / dist) * pushFactor;
                            item.dz += ((currentZ - c.z) / dist) * pushFactor;
                        }
                    }
                });

                // 2. Khuấy tung Đĩa Ngân Hà (galaxyHearts)
                galaxyHearts.forEach(g => {
                    let baseX = Math.cos(g.angle) * g.radius + g.dx;
                    let baseZ = Math.sin(g.angle) * g.radius + g.dz;
                    let baseY = g.y + g.dy;

                    let distSq = Math.pow(baseX - c.x, 2) + Math.pow(baseY - c.y, 2) + Math.pow(baseZ - c.z, 2);
                    if (distSq < impactRadius * impactRadius) {
                        let dist = Math.sqrt(distSq) || 1;
                        let pushFactor = ((impactRadius - dist) / impactRadius) * force * 1.5; // Ngân hà bị khuấy mạnh hơn chút
                        g.dx += ((baseX - c.x) / dist) * pushFactor;
                        g.dy += ((baseY - c.y) / dist) * pushFactor;
                        g.dz += ((baseZ - c.z) / dist) * pushFactor;
                    }
                });
            }

            // ===============================================
            // VẼ TRÁI TIM LỚN VÀ VỆ TINH
            // ===============================================
            items.forEach(item => {
                let baseX, baseY, baseZ;
                let isHeartParticle = item.isStatic;

                if (isHeartParticle) {
                    // PHỤC HỒI ĐÀN HỒI: Ma sát lò xo 0.85 giúp hạt bật về vị trí cũ
                    item.dx *= 0.85;
                    item.dy *= 0.85;
                    item.dz *= 0.85;

                    baseX = item.originX + item.dx;
                    baseY = item.originY + item.dy;
                    baseZ = item.originZ + item.dz;
                } else {
                    item.path_t += item.orbit_speed;
                    let pathPoint = getParametricHeartPoint(item.path_t, item.orbit_radius);
                    let tempX = pathPoint.x; let tempY = pathPoint.y * Math.cos(item.orbit_x_angle) - pathPoint.z * Math.sin(item.orbit_x_angle); let tempZ = pathPoint.y * Math.sin(item.orbit_x_angle) + pathPoint.z * Math.cos(item.orbit_x_angle);
                    baseX = tempX * Math.cos(item.orbit_y_angle) - tempZ * Math.sin(item.orbit_y_angle); baseY = tempY; baseZ = tempX * Math.sin(item.orbit_y_angle) + tempZ * Math.cos(item.orbit_y_angle);
                }

                let mod = applySequenceModifiers(item, isHeartParticle, baseX, baseY, baseZ);
                let proj = project3D(mod.x, mod.y, mod.z, finalRotX, finalRotY, globalZoom);

                item.screenX = proj.screenX; item.screenY = proj.screenY; item.screenZ = proj.screenZ; item.scale = proj.scale;
            });

            items.sort((a, b) => b.screenZ - a.screenZ);

            items.forEach(item => {
                if (item.scale < 0) return;

                if (item.type === 'image') {
                    if (item.img.complete) {
                        let size = 35 * item.scale;
                        let x = item.screenX; let y = item.screenY;
                        ctx.save();
                        ctx.beginPath(); ctx.arc(x, y, size / 2, 0, Math.PI * 2); ctx.clip();
                        ctx.drawImage(item.img, x - size / 2, y - size / 2, size, size);
                        ctx.restore();
                        ctx.beginPath(); ctx.arc(x, y, size / 2 + 2, 0, Math.PI * 2);
                        ctx.strokeStyle = `rgba(255, 0, 85, ${item.scale})`;
                        ctx.lineWidth = 2 * item.scale;
                        ctx.stroke();
                    }
                } else if (item.type === 'text') {
                    let fontSize = Math.max(10, 14 * item.scale);
                    ctx.font = `bold ${fontSize}px 'Segoe UI', sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.fillStyle = `rgba(255, 77, 136, ${item.scale})`;
                    ctx.fillText(item.text, item.screenX, item.screenY);
                } else {
                    let size = item.size * item.scale * beatScale;
                    if (size > 0.5) {
                        ctx.fillStyle = item.color;
                        ctx.save();
                        ctx.translate(item.screenX, item.screenY);
                        ctx.scale(size / 16, size / 16);
                        ctx.fill(heartPath);
                        ctx.restore();
                    }
                }
            });

            if (sequenceTick > 150 && sequenceTick < 165) {
                let flashAlpha = 1 - (sequenceTick - 150) / 15;
                ctx.fillStyle = `rgba(255, 0, 85, ${flashAlpha * 0.8})`;
                ctx.fillRect(0, 0, w, h);
            }
            ctx.globalAlpha = 1;

            // ===============================================
            // GALAXY TỰ PHỤC HỒI & RISING HEARTS
            // ===============================================
            galaxyHearts.forEach(g => {
                g.angle += g.speed;

                // PHỤC HỒI ĐÀN HỒI CHO NGÂN HÀ: Hạt bị văng ra sẽ trôi từ từ về vị trí quỹ đạo
                g.dx *= 0.9;
                g.dy *= 0.9;
                g.dz *= 0.9;

                let baseX = Math.cos(g.angle) * g.radius + g.dx;
                let baseZ = Math.sin(g.angle) * g.radius + g.dz;
                let baseY = g.y + g.dy;

                let mod = applySequenceModifiers(g, true, baseX, baseY, baseZ);
                let proj = project3D(mod.x, mod.y, mod.z, finalRotX, finalRotY, globalZoom);

                if (proj.scale <= 0) return;

                if (g.type === "heart") {
                    let size = g.size * proj.scale;
                    ctx.save(); ctx.translate(proj.screenX, proj.screenY); ctx.scale(size / 16, size / 16); ctx.fillStyle = g.color; ctx.fill(heartPath); ctx.restore();
                } else {
                    ctx.font = `${g.size * proj.scale}px Segoe UI`; ctx.fillStyle = `rgba(255,120,160,${proj.scale})`; ctx.fillText(g.text, proj.screenX, proj.screenY);
                }
            });

            risingHearts.forEach(p => {
                if (p.state === 0) { p.angle += p.speed; p.radius *= 0.995; p.y -= p.lift; p.orbit--; if (p.orbit < 0) p.state = 1; }
                if (p.state === 1) { p.angle += p.speed * 3; p.radius *= 0.92; p.y -= p.lift * 2; }
                let baseX = Math.cos(p.angle) * p.radius; let baseZ = Math.sin(p.angle) * p.radius; let baseY = p.y;
                let mod = applySequenceModifiers(p, true, baseX, baseY, baseZ);
                let proj = project3D(mod.x, mod.y, mod.z, finalRotX, finalRotY, globalZoom);
                if (p.radius < 30) {
                    let diskRadius = Math.min(w, h) * 0.6; p.radius = diskRadius * (0.6 + Math.random() * 0.4); p.y = 120 + Math.random() * 20; p.angle = Math.random() * Math.PI * 2; p.orbit = 100 + Math.random() * 80; p.state = 0;
                }
                if (proj.scale <= 0) return;
                let size = p.size * proj.scale;
                ctx.save(); ctx.translate(proj.screenX, proj.screenY); ctx.scale(size / 16, size / 16); ctx.fillStyle = p.color; ctx.fill(heartPath); ctx.restore();
            });

            requestAnimationFrame(render);
        }

        function createRisingHearts() {
            risingHearts.length = 0;
            let count = 300; let diskRadius = Math.min(w, h) * 1;
            for (let i = 0; i < count; i++) {
                risingHearts.push({
                    angle: Math.random() * Math.PI * 2, radius: diskRadius * (0.6 + Math.random() * 0.4), y: 120 + Math.random() * 20,
                    speed: 0.02 + Math.random() * 0.001, lift: 0.8 + Math.random() * 0.8, orbit: 100 + Math.random() * 80, state: 0,
                    size: 4 + Math.random() * 4, color: `hsla(${330 + Math.random() * 20},100%,65%,0.9)`,
                    ex: Math.random() * 2 - 1, ey: Math.random() * 2 - 1, ez: Math.random() * 2 - 1, vx: (Math.random() - 0.5) * 3, vy: (Math.random() - 0.5) * 3, vz: (Math.random() - 0.5) * 3
                });
            }
        }

        function createGalaxyDisk() {
    galaxyHearts.length = 0;
    
    // Tăng số lượng hạt tim để đĩa dày dặn hơn
    let numHearts = 2000; 
    let numTexts = 40; 
    
    // Bán kính đĩa ngân hà
    let radius = Math.min(w, h) * 0.6; 
    
    // KHOẢNG CÁCH TỪ TÂM TRÁI TIM ĐẾN ĐĨA (Đẩy xuống dưới đuôi)
    // Bạn có thể tăng số 0.4 lên 0.5 hoặc 0.6 nếu muốn cách xa hơn nữa
    let gapFromTail = Math.min(w, h) * 0.2; 

    // 1. TẠO CÁC HẠT TRÁI TIM NHỎ TRONG ĐĨA
    for (let i = 0; i < numHearts; i++) {
        galaxyHearts.push({
            type: "heart", 
            angle: Math.random() * Math.PI * 2, 
            radius: Math.random() * radius, 
            y: gapFromTail, // Vị trí theo chiều dọc
            dx: 0, dy: 0, dz: 0,
            speed: 0.005 + Math.random() * 0.001, // Tốc độ quay của hạt tim
            size: 2 + Math.random() * 3, // Kích thước hạt tim nhỏ xinh
            color: `hsla(${330 + Math.random() * 20},100%,60%,0.8)`,
            ex: Math.random() * 2 - 1, ey: Math.random() * 2 - 1, ez: Math.random() * 2 - 1, 
            vx: (Math.random() - 0.5) * 3, vy: (Math.random() - 0.5) * 3, vz: (Math.random() - 0.5) * 3
        });
    }

    // 2. TẠO CÁC CHỮ (YÊU, ANH, VỢ...) QUAY NHANH VÀ NHỎ
    for (let i = 0; i < numTexts; i++) {
        galaxyHearts.push({
            type: "text", 
            text: textMessages[i % textMessages.length], 
            angle: Math.random() * Math.PI * 2, 
            radius: radius * (0.4 + Math.random() * 0.6), // Chữ thường ở rìa ngoài đĩa cho đẹp
            y: gapFromTail, 
            dx: 0, dy: 0, dz: 0,
            
            // TĂNG TỐC ĐỘ QUAY (Speed cao hơn cũ)
            speed: 0.002 + Math.random() * 0.001, 
            
            // GIẢM KÍCH THƯỚC CHỮ (Nhỏ hơn cũ)
            size: 10 + Math.random() * 10, 
            
            vx: (Math.random() - 0.5) * 3, vy: (Math.random() - 0.5) * 3, vz: (Math.random() - 0.5) * 3
        });
    }
}

        // ==========================================
        // XỬ LÝ TƯƠNG TÁC
        // ==========================================
        function handlePointerDown(e) { if (e.target !== canvas) return; isDragging = true; isClick = true; let c = e.touches ? e.touches[0] : e; startX = c.clientX; startY = c.clientY; }
        function handlePointerMove(e) { if (!isDragging) return; let c = e.touches ? e.touches[0] : e; let dx = c.clientX - startX; let dy = c.clientY - startY; if (Math.abs(dx) > 5 || Math.abs(dy) > 5) isClick = false; targetDragRotY += dx * 0.002; targetDragRotX += dy * 0.002; startX = c.clientX; startY = c.clientY; }
        function handlePointerUp(e) { if (!isDragging) return; isDragging = false; if (isClick) { let c = e.changedTouches ? e.changedTouches[0] : e; checkInteractions(c.clientX, c.clientY); } }

        function checkInteractions(mx, my) {
            let rect = canvas.getBoundingClientRect(); mx -= rect.left; my -= rect.top;
            for (let i = items.length - 1; i >= 0; i--) { let item = items[i]; if (item.type === 'image' && item.scale > 0) { let size = 35 * item.scale; if (Math.pow(mx - item.screenX, 2) + Math.pow(my - item.screenY, 2) <= Math.pow(size / 2, 2)) { zoomImage(item.img.src); return; } } }
            if (sequenceTick === 0) { let dx_heart = mx - w / 2; let dy_heart = my - (h / 2 - 20 * globalZoom); let clickRadius = Math.min(w, h) * 0.2 * globalZoom; if (Math.pow(dx_heart, 2) + Math.pow(dy_heart, 2) <= Math.pow(clickRadius, 2)) sequenceTick = 1; }
        }

        const overlay = document.getElementById("image-overlay"), zoomedImg = document.getElementById("zoomed-image");
        function zoomImage(s) { zoomedImg.src = s; overlay.classList.add("active"); }
        function closeZoom() { overlay.classList.remove("active"); setTimeout(() => zoomedImg.src = "", 300); }
        canvas.addEventListener('wheel', (e) => { e.preventDefault(); targetZoom = Math.max(0.3, Math.min(targetZoom + e.deltaY * -0.001, 3)); }, { passive: false });
        canvas.addEventListener('mousedown', handlePointerDown); window.addEventListener('mousemove', handlePointerMove); window.addEventListener('mouseup', handlePointerUp);
        canvas.addEventListener('touchstart', handlePointerDown, { passive: false }); window.addEventListener('touchmove', handlePointerMove, { passive: false }); window.addEventListener('touchend', handlePointerUp);

        function start() {
            // 1. Ẩn màn hình Intro
            document.getElementById('intro').classList.add('hidden');

            // 2. Phát nhạc nền
            let music = document.getElementById('music');
            music.play().catch(e => console.log("Vui lòng tương tác với màn hình để phát nhạc:", e));

            // 3. Khởi tạo toàn bộ các thực thể trong vũ trụ
            createStars();
            createHeartStars();
            create3DHeart();
            createOrbitingItems();
            createGalaxyDisk();
            createRisingHearts();

            // 4. KÍCH HOẠT HIỆU ỨNG VŨ TRỤ HÌNH THÀNH (BIG BANG)
            // Đặt sequenceTick = 149 để frame tiếp theo (150) tạo ra cú chớp sáng chói lòa
            // Sau đó các hạt sẽ từ xa xôi (radius 3000) bay vào tâm và kết dính lại thành trái tim 3D
            sequenceTick = 149;

            isRunning = true;
            render(); // Khởi động vòng lặp 3D
        }
    </script>
